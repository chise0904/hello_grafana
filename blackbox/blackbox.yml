modules:

  # ── HTTP/HTTPS 探測（回應 2xx 視為成功）────────────────────────────────
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: []   # 空 = 接受所有 2xx
      method: GET
      follow_redirects: true
      preferred_ip_protocol: "ip4"

  # ── TCP 連線探測（只測 port 能不能連上）───────────────────────────────
  tcp_connect:
    prober: tcp
    timeout: 5s
