global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alertmanager 設定 ──────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# ── Alert Rules 載入 ───────────────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/alert-rules.yml"
  - "/etc/prometheus/rules/*.yml"

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    metrics_path: /metrics

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # ── Blackbox：HTTP 探測 ─────────────────────────────────────────────────
  - job_name: "blackbox-http"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://www.google.com
          - https://github.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ── Blackbox：TCP 探測（測試 PostgreSQL port 是否開啟）─────────────────
  - job_name: "blackbox-tcp"
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - postgres:5432
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # ── API Server A（OTel Prometheus exporter）────────────────────────────
  - job_name: "server-a"
    static_configs:
      - targets: ["server-a:8001"]
    metrics_path: /metrics

  # ── API Server B（OTel Prometheus exporter）────────────────────────────
  - job_name: "server-b"
    static_configs:
      - targets: ["server-b:8002"]
    metrics_path: /metrics

  # ── SSL Exporter：憑證到期監控 ─────────────────────────────────────────
  - job_name: "ssl"
    metrics_path: /probe
    params:
      module: [tcp]
    static_configs:
      - targets:
          - github.com:443
          - google.com:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: ssl-exporter:9219
