groups:
  - name: postgresql-demo-alerts
    interval: 15s
    rules:

      # ── 1. 容易觸發的 Demo 指標：labdb 有活躍連線就觸發 ─────────────────────
      # pg_stat_database_numbackends > 0 代表 labdb 有人連進來，只要系統跑著就會 fire
      - alert: LabDBHasConnections
        expr: pg_stat_database_numbackends{datname="labdb"} > 0
        for: 1m   # 持續 1 分鐘才觸發（避免瞬間抖動）
        labels:
          severity: warning
        annotations:
          summary: "labdb 有 {{ $value }} 條活躍連線"
          description: >-
            PostgreSQL 資料庫 labdb 目前有 {{ $value }} 條後端連線，
            超過閾值 0（此為 Demo 用途，確保 Alert 能觸發）。

      # ── 2. Postgres Exporter 掉線 ──────────────────────────────────────────
      - alert: PostgresExporterDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "postgres_exporter 無法連線到 PostgreSQL"
          description: >-
            pg_up == 0，Prometheus 無法從 postgres-exporter 取得指標，
            請確認 PostgreSQL 或 exporter 是否正常運作。

      # ── 3. 高連線數警告（正式環境常見場景）────────────────────────────────
      - alert: PostgresHighConnections
        expr: >-
          pg_stat_database_numbackends{datname="labdb"}
          / pg_settings_max_connections * 100 > 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL 連線使用率超過 60%"
          description: >-
            labdb 連線使用率達 {{ $value | printf "%.1f" }}%，
            max_connections 已用超過 60%，請注意連線池設定。

      # ── 4. 大量 Dead Tuples（需要 VACUUM）──────────────────────────────────
      - alert: PostgresHighDeadTuples
        expr: >-
          pg_stat_user_tables_n_dead_tup{datname="labdb"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "資料表 {{ $labels.relname }} dead tuples 過多"
          description: >-
            {{ $labels.relname }} 累積了 {{ $value }} 個 dead tuples，
            建議執行 VACUUM 或檢查 autovacuum 設定。

  # ============================================================
  #  Lock 相關告警群組
  #
  #  設計原則：
  #  短暫的 lock 是 PostgreSQL 正常行為，每個 transaction 都會持有再釋放。
  #  Prometheus 的 `for:` 代表「條件必須持續為 true 達該時間才觸發」，
  #  因此 for 的長短決定了「能容忍 lock 持續多久」：
  #    - warning  → for: 2m（等待超過 2 分鐘才算值得關注）
  #    - critical → for: 1m（多條 session 同時卡住，1 分鐘就夠嚴重）
  #    - DDL lock → for: 2m（維護腳本正常可能需要幾十秒，2 分鐘才算異常）
  # ============================================================
  - name: postgresql-lock-alerts
    interval: 15s
    rules:

      # ── 5. 有 session 正在等待 Lock ────────────────────────────────────────
      # 條件必須持續 2 分鐘才觸發，過濾掉瞬間競爭的正常情況
      - alert: PostgresLockWaitDetected
        expr: >-
          pg_stat_activity_count{datname="labdb", wait_event_type="Lock"} > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "lock 等待持續超過 2 分鐘（{{ $value }} 條 session 受阻）"
          description: >-
            labdb 有 {{ $value }} 條連線等待 lock 已超過 2 分鐘，
            可能有長事務未提交導致阻塞堆積，
            請執行：SELECT pid, now() - pg_stat_activity.query_start AS duration,
            query, state FROM pg_stat_activity WHERE wait_event_type = 'Lock';

      # ── 6. 嚴重 Lock 等待（多條 session 同時卡住）──────────────────────────
      - alert: PostgresLockWaitCritical
        expr: >-
          pg_stat_activity_count{datname="labdb", wait_event_type="Lock"} >= 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "嚴重：{{ $value }} 條 session 等待 Lock 超過 1 分鐘"
          description: >-
            labdb 有 {{ $value }} 條連線同時卡在 lock 等待超過 1 分鐘，
            極可能正在發生 lock 堆積或 deadlock 前兆，
            請立即執行：SELECT * FROM pg_blocking_pids(pid) 找出阻塞源頭。

      # ── 7. AccessExclusiveLock 持續過久（DDL 長時間佔用）──────────────────
      # 短暫的 DDL（如快速 ALTER）持有幾秒是正常的，
      # 超過 2 分鐘才代表 DDL 卡住或忘記提交事務
      - alert: PostgresAccessExclusiveLockStuck
        expr: >-
          pg_locks_count{datname="labdb", mode="AccessExclusiveLock"} > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "AccessExclusiveLock 持續超過 2 分鐘（DDL 卡住？）"
          description: >-
            labdb 的 AccessExclusiveLock 已持續超過 2 分鐘（目前 {{ $value }} 個），
            此 lock 會阻塞所有對該資料表的讀寫，
            請確認是否有 ALTER TABLE / TRUNCATE / DROP 未完成或未提交。

      # ── 8. ExclusiveLock 數量過多且持續（寫入競爭嚴重）────────────────────
      - alert: PostgresHighExclusiveLocks
        expr: >-
          pg_locks_count{datname="labdb", mode="ExclusiveLock"} > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "ExclusiveLock 持續偏高超過 3 分鐘（目前 {{ $value }} 個）"
          description: >-
            labdb ExclusiveLock 維持在 {{ $value }} 個超過 3 分鐘，
            通常表示大量寫入事務持續競爭相同資料列，建議檢查業務邏輯或 batch 操作頻率。

      # ── 9. 總 Lock 數量異常（整體 lock 壓力指標）──────────────────────────
      - alert: PostgresTotalLocksHigh
        expr: >-
          sum(pg_locks_count{datname="labdb"}) > 100
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "labdb 總 lock 數持續超過 100（目前 {{ $value }} 個）"
          description: >-
            labdb 所有 lock 類型合計達 {{ $value }} 個，已持續超過 3 分鐘，
            整體 lock 壓力持續偏高，建議確認是否有長事務或連線池洩漏。
