groups:
  - name: postgresql-demo-alerts
    interval: 15s
    rules:

      # ── 1. 容易觸發的 Demo 指標：labdb 有活躍連線就觸發 ─────────────────────
      # pg_stat_database_numbackends > 0 代表 labdb 有人連進來，只要系統跑著就會 fire
      - alert: LabDBHasConnections
        expr: pg_stat_database_numbackends{datname="labdb"} > 0
        for: 1m   # 持續 1 分鐘才觸發（避免瞬間抖動）
        labels:
          severity: warning
        annotations:
          summary: "labdb 有 {{ $value }} 條活躍連線"
          description: >-
            PostgreSQL 資料庫 labdb 目前有 {{ $value }} 條後端連線，
            超過閾值 0（此為 Demo 用途，確保 Alert 能觸發）。

      # ── 2. Postgres Exporter 掉線 ──────────────────────────────────────────
      - alert: PostgresExporterDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "postgres_exporter 無法連線到 PostgreSQL"
          description: >-
            pg_up == 0，Prometheus 無法從 postgres-exporter 取得指標，
            請確認 PostgreSQL 或 exporter 是否正常運作。

      # ── 3. 高連線數警告（正式環境常見場景）────────────────────────────────
      - alert: PostgresHighConnections
        expr: >-
          pg_stat_database_numbackends{datname="labdb"}
          / pg_settings_max_connections * 100 > 60
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL 連線使用率超過 60%"
          description: >-
            labdb 連線使用率達 {{ $value | printf "%.1f" }}%，
            max_connections 已用超過 60%，請注意連線池設定。

      # ── 4. 大量 Dead Tuples（需要 VACUUM）──────────────────────────────────
      - alert: PostgresHighDeadTuples
        expr: >-
          pg_stat_user_tables_n_dead_tup{datname="labdb"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "資料表 {{ $labels.relname }} dead tuples 過多"
          description: >-
            {{ $labels.relname }} 累積了 {{ $value }} 個 dead tuples，
            建議執行 VACUUM 或檢查 autovacuum 設定。

  # ============================================================
  #  Lock 相關告警群組
  # ============================================================
  - name: postgresql-lock-alerts
    interval: 15s
    rules:

      # ── 5. 有 session 正在等待 Lock（最直接的 lock 阻塞訊號）───────────────
      # pg_stat_activity_count{wait_event_type="Lock"} 代表目前有幾條 session
      # 正卡在等待取得 lock，> 0 就代表發生了 lock 競爭
      - alert: PostgresLockWaitDetected
        expr: >-
          pg_stat_activity_count{datname="labdb", wait_event_type="Lock"} > 0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "偵測到 {{ $value }} 條 session 正在等待 Lock"
          description: >-
            labdb 有 {{ $value }} 條連線因等待 lock 而被阻塞，
            可能存在 lock 競爭或長事務未提交，請至 pg_stat_activity 確認阻塞來源。

      # ── 6. 嚴重 Lock 等待（多條 session 同時卡住）──────────────────────────
      - alert: PostgresLockWaitCritical
        expr: >-
          pg_stat_activity_count{datname="labdb", wait_event_type="Lock"} >= 5
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "嚴重：{{ $value }} 條 session 同時等待 Lock"
          description: >-
            labdb 有 {{ $value }} 條連線同時等待 lock，可能正在發生 lock 堆積或 deadlock 前兆，
            請立即執行：SELECT * FROM pg_blocking_pids(pid) 找出阻塞源頭。

      # ── 7. AccessExclusiveLock 出現（最強的 lock，會擋住所有讀寫）──────────
      # DDL 操作（ALTER TABLE、TRUNCATE、DROP）會持有 AccessExclusiveLock
      # 正常運作期間不應出現，出現代表有危險的 DDL 正在執行
      - alert: PostgresAccessExclusiveLock
        expr: >-
          pg_locks_count{datname="labdb", mode="AccessExclusiveLock"} > 0
        for: 15s
        labels:
          severity: critical
        annotations:
          summary: "偵測到 AccessExclusiveLock（DDL 操作進行中）"
          description: >-
            labdb 出現 {{ $value }} 個 AccessExclusiveLock，
            此類 lock 由 ALTER TABLE / TRUNCATE / DROP 等 DDL 產生，
            會阻塞所有對該資料表的讀寫，請確認是否為計劃性維護。

      # ── 8. ExclusiveLock 數量過多（寫入競爭嚴重）──────────────────────────
      - alert: PostgresHighExclusiveLocks
        expr: >-
          pg_locks_count{datname="labdb", mode="ExclusiveLock"} > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "ExclusiveLock 數量過多（目前 {{ $value }} 個）"
          description: >-
            labdb ExclusiveLock 累積至 {{ $value }} 個，
            通常表示大量寫入事務同時競爭相同資料列，建議檢查業務邏輯或 batch 操作。

      # ── 9. 總 Lock 數量異常（整體 lock 壓力指標）──────────────────────────
      - alert: PostgresTotalLocksHigh
        expr: >-
          sum(pg_locks_count{datname="labdb"}) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "labdb 總 lock 數量超過 100（目前 {{ $value }} 個）"
          description: >-
            labdb 所有 lock 類型合計達 {{ $value }} 個，
            整體 lock 壓力偏高，建議確認是否有長事務、未提交的 transaction 或連線池未正確釋放連線。
